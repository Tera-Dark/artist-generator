name: Content Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'public/data/**'
      - 'scripts/content-pipeline.mjs'
      - 'package.json'
  pull_request:
    branches: [main, master]
    paths:
      - 'public/data/**'
      - 'scripts/content-pipeline.mjs'
      - 'package.json'

jobs:
  validate-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate prompt content
        run: npm run content:check

  refresh-metadata:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs: validate-content

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate metadata
        run: npm run content:write

      - name: Commit refreshed metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/index.json public/data/prompts.json public/data/featured.json public/data/tags.json
          if git diff --cached --quiet; then
            echo "No metadata changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh prompt metadata [skip ci]"
          git push
